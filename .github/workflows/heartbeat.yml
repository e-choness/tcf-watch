name: Daily heartbeat + monthly keepalive

on:
  schedule:
    - cron: "37 15 * * *"     # daily ~15:37 UTC (~9:37 Calgary)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      TCF_NOTIFIER: telegram
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Send daily heartbeat
        run: python -m tcfwatch heartbeat

      # GitHub disables cron workflows after 60 days without repo activity.
      # A monthly keepalive commit resets that clock permanently.
      - name: Monthly keepalive commit
        if: ${{ github.event_name == 'schedule' }}
        run: |
          if [ "$(date -u +%d)" = "01" ]; then
            git config user.name  "tcf-watch[bot]"
            git config user.email "tcf-watch@users.noreply.github.com"
            date -u +%Y-%m-%d > .keepalive
            git add .keepalive
            git commit -m "keepalive: $(date -u +%Y-%m)"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push
          fi
